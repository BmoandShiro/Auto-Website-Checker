name: Build Portable Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          python -m playwright install chromium

      - name: Build onedir app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name "WebsiteAuditer" --icon "assets/app-icon.png" --collect-data "spellchecker" --add-data "settings.json;." --add-data "run-history;run-history" --add-data "assets/app-icon.png;assets" "gui.py"
          $env:PLAYWRIGHT_BROWSERS_PATH = "$pwd\dist\WebsiteAuditer\ms-playwright"
          python -m playwright install chromium

      - name: Upload Windows portable dir artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebsiteAuditer-windows-dir
          path: dist/WebsiteAuditer/**
          if-no-files-found: error

      - name: Build onefile EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "WebsiteAuditer" --icon "assets/app-icon.png" --collect-data "spellchecker" --add-data "settings.json;." --add-data "run-history;run-history" --add-data "assets/app-icon.png;assets" "gui.py"

      - name: Upload Windows onefile artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebsiteAuditer-windows-exe
          path: dist/WebsiteAuditer.exe
          if-no-files-found: error

  build-macos-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app bundle
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name "WebsiteAuditer" --icon "assets/app-icon.png" --osx-bundle-identifier com.websiteauditer.app --collect-data "spellchecker" --add-data "settings.json:." --add-data "run-history:run-history" --add-data "assets/app-icon.png:assets" --codesign-identity "" "gui.py"
          export PLAYWRIGHT_BROWSERS_PATH="$(pwd)/dist/WebsiteAuditer.app/Contents/Resources/ms-playwright"
          python -m playwright install chromium
          # Playwright adds files after PyInstaller sealed the bundle; resign so Gatekeeper does not report "damaged".
          codesign --force --deep --sign - "dist/WebsiteAuditer.app"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R "dist/WebsiteAuditer.app" "dist/dmg/"
          hdiutil create -volname "Website Auditer" -srcfolder "dist/dmg" -ov -format UDZO "dist/WebsiteAuditer.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebsiteAuditer-macos-dmg
          path: dist/WebsiteAuditer.dmg
          if-no-files-found: error
