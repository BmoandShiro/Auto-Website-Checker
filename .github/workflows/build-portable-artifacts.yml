name: Build Portable Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build one-file EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "AutoWebsiteChecker" --add-data "settings.json;." --add-data "run-history;run-history" "gui.py"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoWebsiteChecker-windows-exe
          path: dist/AutoWebsiteChecker.exe
          if-no-files-found: error

  build-macos-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app bundle
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name "AutoWebsiteChecker" --add-data "settings.json:." --add-data "run-history:run-history" "gui.py"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R "dist/AutoWebsiteChecker.app" "dist/dmg/"
          hdiutil create -volname "AutoWebsiteChecker" -srcfolder "dist/dmg" -ov -format UDZO "dist/AutoWebsiteChecker.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoWebsiteChecker-macos-dmg
          path: dist/AutoWebsiteChecker.dmg
          if-no-files-found: error
